<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лицей для малышей</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style id="hero-grid-styles"></style>
</head>

<body>

  <header class="site-header" id="site-header"></header>

  <main>
    <section class="hero-section">
      <div class="wrap">
        <div id="hero-titles"></div>
        <div class="hero-grid" id="hero-grid"></div>
      </div>
    </section>

    <section class="cta-section" id="cta-section"></section>

    <section class="programs-section">
      <div class="wrap">
        <div id="programs-header"></div>
        <div class="programs-grid" id="programs-grid"></div>
      </div>
    </section>

    <section class="promo-section" id="promo-section"></section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close" aria-label="Закрыть">×</button>
    <button class="lightbox-arrow lightbox-prev" id="lb-prev" aria-label="Назад">‹</button>
    <button class="lightbox-arrow lightbox-next" id="lb-next" aria-label="Вперёд">›</button>
    <img class="lightbox-img" id="lightbox-img" alt="Фотография центра">
    <p class="lightbox-counter" id="lightbox-counter"></p>
  </div>

  <button class="scroll-top" id="scroll-top" aria-label="Наверх">↑</button>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
